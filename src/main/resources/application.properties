# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.tags.application=donaciones
management.metrics.tags.service=donaciones
management.metrics.tags.env=${DD_ENV:prod}
management.datadog.metrics.export.enabled=true
management.datadog.metrics.export.api-key=${DATADOG_API_KEY:}
management.datadog.metrics.export.uri=${DATADOG_URI:https://api.us5.datadoghq.com}
management.datadog.metrics.export.step=30s

# OpenAPI / Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# External Services
donatrack.donadores-y-entidades.url=${DONADORES_Y_ENTIDADES_URL:}
donatrack.logistica.url=${LOGISTICA_URL:}

# DevTools Configuration
spring.devtools.restart.enabled=true

# Server Configuration for Dockerfile
server.port=${PORT:8080}
